name: Publish candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.campaign-payload/**'
      - '.github/workflows/publish-candidate-campaign.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install complete campaign tree
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .campaign-payload ]; then
            echo 'No staged payload remains.'
            exit 0
          fi
          cat .campaign-payload/chunk-* | tr -d '\n' | base64 --decode > /tmp/candidate-campaign.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          tar -xzf /tmp/candidate-campaign.tar.gz
          test -f index.html
          test -f resume.html
          test -f cover-letter.html
          test -f interview-brief.html
          test -f 90-day-plan.html
          test -f docs/Russell-Dudek-GDIT-Resume.pdf
          test -f docs/Russell-Dudek-GDIT-Cover-Letter.pdf
          rm -rf .campaign-payload

      - name: Commit complete campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No publication changes to commit.'
            exit 0
          fi
          git commit -m 'Publish complete GDIT Enterprise Service Lead candidate campaign [skip ci]'
          git push origin HEAD:main
