name: Finalize resume PDF

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-resume-pdf.yml'
      - 'docs/Russell-Dudek-GDIT-Resume.pdf.b64'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-resume-pdf
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decode and verify resume
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/Russell-Dudek-GDIT-Resume.pdf.b64
          base64 --decode docs/Russell-Dudek-GDIT-Resume.pdf.b64 > docs/Russell-Dudek-GDIT-Resume.pdf
          test "$(pdfinfo docs/Russell-Dudek-GDIT-Resume.pdf | awk '/^Pages:/ {print $2}')" = "2"
          grep -a -q '^%PDF-' docs/Russell-Dudek-GDIT-Resume.pdf
          rm docs/Russell-Dudek-GDIT-Resume.pdf.b64

      - name: Commit verified PDF
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/Russell-Dudek-GDIT-Resume.pdf docs/Russell-Dudek-GDIT-Resume.pdf.b64
          git commit -m 'Finalize verified two-page resume PDF [skip ci]'
          git push origin HEAD:main
